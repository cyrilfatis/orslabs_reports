security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Permettre l'accès aux fichiers HTML des rapports
        reports_public:
            pattern: ^/reports/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: app_dashboard
                always_use_default_target_path: false
                use_referer: true
            logout:
                path: app_logout
                target: app_login

            # Activer la fonctionnalité "remember me"
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800 # 1 semaine en secondes
                path: /
                always_remember_me: false

    # Configuration des accès
    access_control:
        # Les routes publiques
        - { path: ^/login, roles: PUBLIC_ACCESS }
        # Toutes les autres routes nécessitent une authentification
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # Par défaut, les hashs de mot de passe sont gourmands en ressources et prennent du temps.
            # Ceci est important pour protéger les mots de passe de votre application.
            # En mode test, on utilise un hash plus rapide
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Le plus bas possible pour les tests
                time_cost: 3
                memory_cost: 10